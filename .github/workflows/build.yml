    env:
      BASE_URL: https://goodbirds-org.github.io/goodbirds-site
      LOGO_BASENAME: goodbirds_logo_text.png
      MAP_LOGO_URL: ./goodbirds_logo_text.png

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -V
          pip -V
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure docs directories exist
        run: |
          set -euxo pipefail
          mkdir -p "docs/maps/${{ matrix.city.maps_subdir }}"
          mkdir -p "docs/${{ matrix.city.slug }}"

      - name: Copy Goodbirds logo into docs
        run: |
          set -euxo pipefail
          if [ -f "${{ env.LOGO_BASENAME }}" ]; then
            cp "${{ env.LOGO_BASENAME }}" "docs/${{ env.LOGO_BASENAME }}"
          else
            echo "Logo file ${{ env.LOGO_BASENAME }} not found at repo root."
          fi

      - name: Build map for ${{ matrix.city.title }}
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
          OUTPUT_DIR: docs/maps/${{ matrix.city.maps_subdir }}
          MAP_LOGO_FILE: ${{ github.workspace }}/docs/${{ env.LOGO_BASENAME }}
          MAP_LOGO_URL: ${{ env.BASE_URL }}/${{ env.LOGO_BASENAME }}
          MAP_MAIN_TITLE: ${{ matrix.city.title }}
          CENTER_LAT: ${{ matrix.city.center_lat }}
          CENTER_LON: ${{ matrix.city.center_lon }}
          DEFAULT_RADIUS_KM: ${{ matrix.city.default_radius_km }}
          BACK_DAYS: "2"
          MAX_RESULTS: "200"
          ZOOM_START: "11"
          RING_KMS: ${{ matrix.city.ring_kms }}
        run: |
          set -euxo pipefail
          python -m pip freeze
          python scripts/build_map.py

      - name: Write /${{ matrix.city.slug }}/index.html redirect to latest
        run: |
          set -euxo pipefail
          cat > "docs/${{ matrix.city.slug }}/index.html" <<EOF
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="Cache-Control" content="no-store, max-age=0, must-revalidate">
          <meta http-equiv="Pragma" content="no-cache">
          <meta http-equiv="Expires" content="0">
          <meta http-equiv="refresh" content="0; url=${{ matrix.city.latest_href }}?t=${{ github.run_id }}">
          <title>Redirecting</title>
          <p>If you are not redirected, <a href="${{ matrix.city.latest_href }}?t=${{ github.run_id }}">open the current map</a>.</p>
          EOF

      - name: Commit and push city outputs with rebase and retry
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Build maps for ${{ matrix.city.title }} into docs/maps/${{ matrix.city.maps_subdir }} and update pages"
          branch="${BRANCH_NAME:-main}"
          git fetch origin "$branch"
          git pull --rebase origin "$branch" || true
          git push origin "$branch"

  landing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure logo exists in docs
        run: |
          set -euxo pipefail
          if [ -f "goodbirds_logo_text.png" ]; then
            cp "goodbirds_logo_text.png" "docs/goodbirds_logo_text.png"
          fi

      - name: Install PyYAML
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate docs/cities.json
        env:
          GOODBIRDS_WORKFLOW_YAML: .github/workflows/build.yml
          GOODBIRDS_BASE_URL: https://goodbirds.org
        run: |
          set -euxo pipefail
          python scripts/make_cities_json.py

      - name: Write Pages landing index
        run: |
          set -euxo pipefail
          cat > docs/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Goodbirds Maps</title>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
              :root {
                --ink:#111;
                --muted:#555;
                --line:#e5e5e5;
                --accent:#2c7fb8;
                --bg:#fafafa;
                --card:#fff;
                --radius:14px;
                --soft:#f3f7fa;
              }

              html,
              body {
                margin:0;
                padding:0;
                background:var(--bg);
                color:var(--ink);
                font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
              }

              .wrap {
                max-width:1040px;
                margin:40px auto;
                padding:0 20px;
              }

              .brand {
                display:flex;
                align-items:center;
                gap:16px;
              }

              .brand img {
                height:84px;
                flex:0 0 auto;
              }

              h1 {
                font-size:28px;
                margin:12px 0 0;
              }

              p.lead {
                margin:10px 0 26px;
                color:var(--muted);
                font-size:17px;
                max-width:760px;
              }

              .feature-links {
                display:grid;
                grid-template-columns:repeat(2,minmax(0,1fr));
                gap:16px;
                margin:26px 0 34px;
              }

              .feature-card {
                background:var(--card);
                border:1px solid var(--line);
                border-radius:var(--radius);
                transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
              }

              .feature-card:hover {
                transform:translateY(-2px);
                box-shadow:0 6px 18px rgba(0,0,0,.08);
                border-color:#d9d9d9;
              }

              .feature-card a {
                display:block;
                color:inherit;
                text-decoration:none;
                padding:18px 20px;
              }

              .feature-title {
                display:block;
                font-weight:700;
                font-size:19px;
                margin-bottom:4px;
              }

              .feature-meta {
                display:block;
                color:var(--muted);
                font-size:14px;
              }

              .locations {
                margin:36px 0 28px;
              }

              .section-head {
                display:flex;
                align-items:end;
                justify-content:space-between;
                gap:16px;
                margin-bottom:16px;
              }

              .section-head h2 {
                font-size:26px;
                margin:0;
              }

              .section-note {
                color:var(--muted);
                font-size:14px;
                margin:0;
              }

              .state-nav {
                display:flex;
                flex-wrap:wrap;
                gap:8px;
                margin:0 0 24px;
              }

              .state-nav a {
                display:inline-block;
                color:var(--ink);
                text-decoration:none;
                background:#fff;
                border:1px solid var(--line);
                border-radius:999px;
                padding:6px 10px;
                font-size:14px;
              }

              .state-nav a:hover {
                border-color:#cfd8df;
                background:var(--soft);
              }

              .location-group {
                margin:28px 0 36px;
                scroll-margin-top:32px;
              }

              .location-group h3 {
                font-size:18px;
                margin:0 0 12px;
                padding-top:14px;
                border-top:1px solid var(--line);
                letter-spacing:.2px;
              }

              .location-grid {
                display:grid;
                grid-template-columns:repeat(3,minmax(0,1fr));
                gap:14px;
              }

              .card {
                background:var(--card);
                border:1px solid var(--line);
                border-radius:var(--radius);
                transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
              }

              .card:hover {
                transform:translateY(-2px);
                box-shadow:0 6px 18px rgba(0,0,0,.08);
                border-color:#d9d9d9;
              }

              .city {
                display:block;
                text-decoration:none;
                color:inherit;
                padding:15px 16px;
              }

              .city-name {
                display:block;
                font-weight:650;
                font-size:18px;
              }


              .map-section {
                margin:34px 0;
              }

              .map-section h2 {
                font:600 20px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
                margin:0 0 12px;
              }

              .map-frame {
                width:100%;
                border:0;
                border-radius:14px;
                box-shadow:0 1px 4px rgba(0,0,0,.08);
                background:#fff;
              }

              hr {
                border:0;
                border-top:1px solid var(--line);
                margin:28px 0;
              }

              .credits {
                color:var(--muted);
                font-size:14px;
              }

              .credits a {
                color:inherit;
              }

              footer {
                margin-top:24px;
                color:var(--muted);
                font-size:13px;
              }

              .error {
                background:#fff8f8;
                border:1px solid #f1c9c9;
                border-radius:var(--radius);
                padding:14px 16px;
                color:#7a1f1f;
              }

              @media (max-width:800px) {
                .brand {
                  align-items:flex-start;
                }

                .feature-links {
                  grid-template-columns:1fr;
                }

                .location-grid {
                  grid-template-columns:repeat(2,minmax(0,1fr));
                }

                .section-head {
                  display:block;
                }

                .section-note {
                  margin-top:4px;
                }
              }

              @media (max-width:560px) {
                .wrap {
                  margin:24px auto;
                  padding:0 16px;
                }

                .brand {
                  display:block;
                }

                .brand img {
                  height:72px;
                }

                h1 {
                  font-size:25px;
                }

                p.lead {
                  font-size:16px;
                }

                .location-grid {
                  grid-template-columns:1fr;
                }
              }
            </style>
          </head>
          <body>
            <main class="wrap">
              <header class="brand">
                <img src="goodbirds_logo_text.png" alt="Goodbirds">
                <div>
                  <h1>Goodbirds Maps</h1>
                  <p class="lead">Daily snapshots of notable bird sightings around our cities. Built from the eBird API and rendered as interactive maps.</p>
                </div>
              </header>

              <section class="feature-links" aria-label="Featured maps">
                <article class="feature-card">
                  <a href="cities_map.html">
                    <span class="feature-title">Coverage map</span>
                    <span class="feature-meta">Browse all Goodbirds locations on one map.</span>
                  </a>
                </article>
                <article class="feature-card">
                  <a href="mega/index.html">
                    <span class="feature-title">US + Canada Mega-Rarities</span>
                    <span class="feature-meta">Current ABA Code 4 and 5 bird species rarities.</span>
                  </a>
                </article>
                <article class="feature-card">
                  <a href="targets/">
                    <span class="feature-title">Target Species Maps</span>
                    <span class="feature-meta">Focused maps for selected species in selected places.</span>
                  </a>
                </article>
              </section>

              <section class="locations" aria-labelledby="locations-heading">
                <div class="section-head">
                  <h2 id="locations-heading">Locations</h2>
                  <p class="section-note">Grouped alphabetically by state or region.</p>
                </div>

                <nav class="state-nav" id="state-nav" aria-label="Location groups"></nav>
                <div id="locations-list"></div>
              </section>

              <section class="map-section" aria-labelledby="coverage-map-heading">
                <h2 id="coverage-map-heading">Coverage map</h2>
                <iframe src="cities_map.html" title="Goodbirds coverage map" loading="lazy" class="map-frame" style="height:520px;"></iframe>
              </section>

              <section class="map-section" aria-labelledby="mega-map-heading">
                <h2 id="mega-map-heading">US + Canada Mega-Rarities</h2>
                <iframe src="mega/index.html" title="US + Canada Mega-Rarities" loading="lazy" class="map-frame" style="height:600px;"></iframe>
              </section>

              <hr>

              <section class="credits" aria-label="About">
                <p><strong>About the project</strong></p>
                <p>Goodbirds pulls recent Notable sightings from eBird for selected radii and renders them to folium Leaflet maps. Each city page links to the current build for each city. The goal is fast loading, clear labeling, and a clean path to original eBird checklists.</p>
                <p><strong>Built with</strong>: <a href="https://ebird.org/data/download" rel="noopener">eBird API</a>, <a href="https://python.org" rel="noopener">Python</a>, <a href="https://requests.readthedocs.io/" rel="noopener">Requests</a>, <a href="https://python-visualization.github.io/folium/" rel="noopener">folium</a> on top of <a href="https://leafletjs.com/" rel="noopener">Leaflet</a>, <a href="https://pages.github.com/" rel="noopener">GitHub Pages</a>, and <a href="https://github.com/actions" rel="noopener">GitHub Actions</a>.</p>
              </section>

              <footer>
                <p>&copy; <span id="y"></span> Goodbirds. All sightings data courtesy of eBird and its contributors.</p>
              </footer>
            </main>

            <script>
              document.getElementById('y').textContent = new Date().getFullYear();

              const STATE_NAMES = {
                "AZ": "Arizona",
                "CA": "California",
                "CO": "Colorado",
                "FL": "Florida",
                "IL": "Illinois",
                "MA": "Massachusetts",
                "ME": "Maine",
                "MN": "Minnesota",
                "NC": "North Carolina",
                "NH": "New Hampshire",
                "NJ": "New Jersey",
                "NY": "New York",
                "OH": "Ohio",
                "OR": "Oregon",
                "PA": "Pennsylvania",
                "TX": "Texas",
                "VT": "Vermont"
              };

              const STATE_ORDER = [
                "Arizona",
                "California",
                "Colorado",
                "Florida",
                "Illinois",
                "Maine",
                "Massachusetts",
                "Minnesota",
                "New Hampshire",
                "New Jersey",
                "New York",
                "North Carolina",
                "Ohio",
                "Oregon",
                "Pennsylvania",
                "Texas",
                "Vermont",
                "Non-US"
              ];

              function slugify(value) {
                return String(value)
                  .toLowerCase()
                  .replace(/&/g, "and")
                  .replace(/[^a-z0-9]+/g, "-")
                  .replace(/^-+|-+$/g, "");
              }

              function parseTitle(title) {
                const cleanTitle = String(title || "")
                  .replace(/\s*&\s*Vicinity$/i, "")
                  .replace(/\s+and\s+Vicinity$/i, "");

                const commaParts = cleanTitle.split(",").map(part => part.trim());

                if (commaParts.length >= 2) {
                  const region = commaParts[commaParts.length - 1];

                  if (STATE_NAMES[region]) {
                    return {
                      name: commaParts.slice(0, -1).join(", "),
                      meta: region + " & Vicinity",
                      group: STATE_NAMES[region]
                    };
                  }

                  if (region === "QC") {
                    return {
                      name: cleanTitle,
                      meta: "QC & Vicinity",
                      group: "Non-US"
                    };
                  }

                  return {
                    name: cleanTitle,
                    meta: region,
                    group: "Non-US"
                  };
                }

                if (/Aruba/i.test(cleanTitle)) {
                  return {
                    name: cleanTitle,
                    meta: "Aruba",
                    group: "Non-US"
                  };
                }

                return {
                  name: cleanTitle,
                  meta: "Map",
                  group: "Non-US"
                };
              }

              function makeCard(city) {
                const parsed = parseTitle(city.title);
                const article = document.createElement("article");
                article.className = "card";

                const link = document.createElement("a");
                link.className = "city";
                link.href = city.latestUrl;

                const name = document.createElement("span");
                name.className = "city-name";
                name.textContent = parsed.name;

                link.appendChild(name);
                article.appendChild(link);

                return article;
              }

              function renderLocations(cities) {
                const nav = document.getElementById("state-nav");
                const list = document.getElementById("locations-list");

                const grouped = new Map();

                cities.forEach(city => {
                  const parsed = parseTitle(city.title);
                  if (!grouped.has(parsed.group)) {
                    grouped.set(parsed.group, []);
                  }
                  grouped.get(parsed.group).push(city);
                });

                const groups = Array.from(grouped.keys()).sort((a, b) => {
                  const ai = STATE_ORDER.indexOf(a);
                  const bi = STATE_ORDER.indexOf(b);
                  if (ai !== -1 && bi !== -1) return ai - bi;
                  if (ai !== -1) return -1;
                  if (bi !== -1) return 1;
                  return a.localeCompare(b);
                });

                groups.forEach(groupName => {
                  const groupId = "locations-" + slugify(groupName);

                  const navLink = document.createElement("a");
                  navLink.href = "#" + groupId;
                  navLink.textContent = groupName;
                  nav.appendChild(navLink);

                  const section = document.createElement("section");
                  section.id = groupId;
                  section.className = "location-group";
                  section.setAttribute("aria-labelledby", groupId + "-heading");

                  const heading = document.createElement("h3");
                  heading.id = groupId + "-heading";
                  heading.textContent = groupName;

                  const grid = document.createElement("div");
                  grid.className = "location-grid";

                  grouped.get(groupName)
                    .sort((a, b) => parseTitle(a.title).name.localeCompare(parseTitle(b.title).name))
                    .forEach(city => {
                      grid.appendChild(makeCard(city));
                    });

                  section.appendChild(heading);
                  section.appendChild(grid);
                  list.appendChild(section);
                });
              }

              fetch("cities.json", {cache: "no-store"})
                .then(response => {
                  if (!response.ok) {
                    throw new Error("Could not load cities.json");
                  }
                  return response.json();
                })
                .then(renderLocations)
                .catch(error => {
                  const list = document.getElementById("locations-list");
                  list.innerHTML = '<div class="error"><strong>Locations could not be loaded.</strong><br>Check that cities.json exists and is valid.</div>';
                  console.error(error);
                });
            </script>
          </body>
          </html>
          HTML


      - name: Commit and push landing with rebase and retry
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No landing changes to commit."
            exit 0
          fi
          git commit -m "Update landing index for GitHub Pages"
          branch="${BRANCH_NAME:-main}"
          git fetch origin "$branch"
          git pull --rebase origin "$branch" || true
          git push origin "$branch"