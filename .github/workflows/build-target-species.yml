# GOODBIRDS_TARGET_SPECIES_V10_CLEAR_SPECIES_AND_INDEX_REFRESH_2026-05-15
name: Build Target Species Maps

on:
  schedule:
    - cron: "30 9 * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-target-species
  cancel-in-progress: false

jobs:
  build-targets:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        target:
          - slug: estero
            title: "Estero, FL Target Species"
            center_lat: "26.4317"
            center_lng: "-81.8187"
            dist_km: "32"
            back_days: "3"
            output_dir: "docs/targets/estero/data"
            page_out: "docs/targets/estero/index.html"
            zoom: "10"
            species_json: >
              [
                {"code":"burowl","name":"Burrowing Owl","color":"#8B4513"},
                {"code":"rosspo1","name":"Roseate Spoonbill","color":"#FF69B4"},
                {"code":"limpki","name":"Limpkin","color":"#FFD700"},
                {"code":"paibun","name":"Painted Bunting","color":"#4169E1"},
                {"code":"sancra","name":"Sandhill Crane","color":"#DC143C"}
              ]

          - slug: noord-aruba
            title: "Noord, Aruba Target Species"
            center_lat: "12.561674"
            center_lng: "-70.048173"
            dist_km: "10"
            back_days: "3"
            output_dir: "docs/targets/noord-aruba/data"
            page_out: "docs/targets/noord-aruba/index.html"
            zoom: "12"
            species_json: >
              [
                {"code":"brnboo","name":"Brown Booby","color":"#8B4513"},
                {"code":"purgal2","name":"Purple Gallinule","color":"#800080"},
                {"code":"ventro1","name":"Venezuelan Troupial","color":"#FF8C00"},
                {"code":"y00678","name":"Crested Caracara","color":"#808080"},
                {"code":"ruthum1","name":"Ruby-topaz Hummingbird","color":"#D00000"},
                {"code":"bknsti","name":"Black-necked Stilt","color":"#000000"},
                {"code":"soulap1","name":"Southern Lapwing","color":"#008080"}
              ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install requests folium

      - name: Ensure target directories exist
        run: |
          set -euxo pipefail
          mkdir -p "${{ matrix.target.output_dir }}"
          mkdir -p "$(dirname '${{ matrix.target.page_out }}')"

      - name: Fetch target species data for ${{ matrix.target.title }}
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
          CENTER_LAT: ${{ matrix.target.center_lat }}
          CENTER_LNG: ${{ matrix.target.center_lng }}
          DIST_KM: ${{ matrix.target.dist_km }}
          BACK_DAYS: ${{ matrix.target.back_days }}
          OUTPUT_DIR: ${{ matrix.target.output_dir }}
          TARGET_SPECIES_JSON: ${{ matrix.target.species_json }}
        run: |
          set -euxo pipefail
          python scripts/fetch_target_species.py

      - name: Build target map page for ${{ matrix.target.title }}
        run: |
          set -euxo pipefail
          python scripts/build_target_map_page.py \
            --data "${{ matrix.target.output_dir }}/observations.json" \
            --out "${{ matrix.target.page_out }}" \
            --title "${{ matrix.target.title }}" \
            --zoom "${{ matrix.target.zoom }}"

      - name: Commit and push target species outputs
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/targets scripts/build_target_map_page.py .github/workflows/build-target-species.yml .github/workflows/post-target-map-to-bluesky.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update target species maps"
          branch="${BRANCH_NAME:-main}"
          git fetch origin "$branch"
          git pull --rebase origin "$branch" || true
          git push origin "$branch"

  target-index:
    runs-on: ubuntu-latest
    needs: build-targets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install index dependency
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Refresh branch after target map commits
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          branch="${BRANCH_NAME:-main}"
          git fetch origin "$branch"
          git checkout "$branch"
          git reset --hard "origin/$branch"

      - name: Generate target species index
        env:
          GOODBIRDS_TARGET_WORKFLOW_YAML: .github/workflows/build-target-species.yml
          GOODBIRDS_BASE_URL: https://goodbirds.org
        run: |
          set -euxo pipefail
          python - <<'PY'
          import html
          import json
          import os
          import pathlib
          import yaml

          workflow_path = pathlib.Path(os.environ.get("GOODBIRDS_TARGET_WORKFLOW_YAML", ".github/workflows/build-target-species.yml"))
          base_url = os.environ.get("GOODBIRDS_BASE_URL", "https://goodbirds.org").rstrip("/")

          with workflow_path.open("r", encoding="utf-8") as fh:
              doc = yaml.safe_load(fh)

          targets = doc["jobs"]["build-targets"]["strategy"]["matrix"]["target"]
          out = []
          for target in targets:
              slug = str(target.get("slug", "")).strip()
              title = str(target.get("title", slug)).strip()
              species = json.loads(target.get("species_json") or "[]")
              out.append({
                  "slug": slug,
                  "title": title,
                  "url": f"{base_url}/targets/{slug}/",
                  "centerLat": float(target.get("center_lat")),
                  "centerLng": float(target.get("center_lng")),
                  "distKm": int(target.get("dist_km")),
                  "backDays": int(target.get("back_days")),
                  "species": species,
              })

          docs_targets = pathlib.Path("docs/targets")
          docs_targets.mkdir(parents=True, exist_ok=True)
          (docs_targets / "targets.json").write_text(json.dumps(out, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          def esc(value):
              return html.escape(str(value or ""), quote=True)

          cards = []
          for target in out:
              species_items = []
              for sp in target["species"]:
                  name = esc(sp.get("name") or sp.get("code") or "Target species")
                  color = esc(sp.get("color") or "#666666")
                  species_items.append(
                      f"<li><span class='swatch' style='background:{color}'></span><span>{name}</span></li>"
                  )
              cards.append(f"""
                <article class="target-card">
                  <a class="target-link" href="{esc(target['url'])}">
                    <h2>{esc(target['title'])}</h2>
                    <p class="meta">{esc(target['distKm'])} km search radius · last {esc(target['backDays'])} days</p>
                  </a>
                  <ul class="species-list">{''.join(species_items)}</ul>
                </article>
              """)

          html_text = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Goodbirds Target Species Maps</title>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
              :root {{
                --ink:#111;
                --muted:#555;
                --line:#e5e5e5;
                --bg:#fafafa;
                --card:#fff;
                --radius:14px;
              }}
              html, body {{
                margin:0;
                padding:0;
                background:var(--bg);
                color:var(--ink);
                font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
              }}
              .wrap {{
                max-width:1040px;
                margin:40px auto;
                padding:0 20px;
              }}
              .brand {{
                display:flex;
                align-items:center;
                gap:16px;
              }}
              .brand img {{
                height:84px;
                flex:0 0 auto;
              }}
              h1 {{
                font-size:28px;
                margin:12px 0 0;
              }}
              .lead {{
                margin:10px 0 26px;
                color:var(--muted);
                font-size:17px;
                max-width:760px;
              }}
              .nav {{
                margin:0 0 22px;
              }}
              .nav a {{
                color:#1f6fa8;
                font-weight:700;
                text-decoration:none;
              }}
              .nav a:hover {{
                text-decoration:underline;
              }}
              .target-grid {{
                display:grid;
                grid-template-columns:repeat(2,minmax(0,1fr));
                gap:16px;
              }}
              .target-card {{
                background:var(--card);
                border:1px solid var(--line);
                border-radius:var(--radius);
                padding:18px 20px;
                box-shadow:0 1px 4px rgba(0,0,0,.04);
              }}
              .target-link {{
                display:block;
                color:inherit;
                text-decoration:none;
              }}
              .target-link:hover h2 {{
                text-decoration:underline;
              }}
              .target-card h2 {{
                font-size:21px;
                margin:0 0 4px;
              }}
              .meta {{
                margin:0 0 14px;
                color:var(--muted);
                font-size:14px;
              }}
              .species-list {{
                list-style:none;
                margin:0;
                padding:0;
                display:grid;
                grid-template-columns:repeat(2,minmax(0,1fr));
                gap:7px 12px;
              }}
              .species-list li {{
                display:grid;
                grid-template-columns:14px 1fr;
                gap:7px;
                align-items:center;
                font-size:14px;
              }}
              .swatch {{
                width:11px;
                height:11px;
                border-radius:50%;
                border:1px solid rgba(0,0,0,.4);
              }}
              .credits {{
                border-top:1px solid var(--line);
                margin-top:30px;
                padding-top:18px;
                color:var(--muted);
                font-size:13px;
              }}
              @media (max-width:760px) {{
                .target-grid {{ grid-template-columns:1fr; }}
                .species-list {{ grid-template-columns:1fr; }}
              }}
              @media (max-width:560px) {{
                .wrap {{ margin:24px auto; padding:0 16px; }}
                .brand {{ display:block; }}
                .brand img {{ height:72px; }}
                h1 {{ font-size:25px; }}
              }}
            </style>
          </head>
          <body>
            <main class="wrap">
              <header class="brand">
                <img src="../goodbirds_logo_text.png" alt="Goodbirds">
                <div>
                  <h1>Target Species Maps</h1>
                  <p class="lead">Focused Goodbirds maps for selected species in selected places. Each card lists every species currently included for that location.</p>
                </div>
              </header>
              <p class="nav"><a href="../">← Back to all Goodbirds maps</a></p>
              <section class="target-grid" aria-label="Target species map list">
                {''.join(cards)}
              </section>
              <section class="credits" aria-label="About target maps">
                <p>Target species data is fetched from eBird for each configured location and rendered as an interactive Leaflet map.</p>
              </section>
            </main>
            <!-- Google tag (gtag.js) -->
            <script async src="https://www.googletagmanager.com/gtag/js?id=G-NYEBPC2JEZ"></script>
            <script>
              window.dataLayer = window.dataLayer || [];
              function gtag(){{dataLayer.push(arguments);}}
              gtag('js', new Date());
              gtag('config', 'G-NYEBPC2JEZ');
            </script>
          </body>
          </html>
          """
          (docs_targets / "index.html").write_text(html_text, encoding="utf-8")
          print(f"Wrote docs/targets/targets.json with {len(out)} targets")
          print("Wrote docs/targets/index.html")
          PY

      - name: Commit and push target index
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/targets/index.html docs/targets/targets.json .github/workflows/build-target-species.yml
          if git diff --cached --quiet; then
            echo "No target index changes to commit."
            exit 0
          fi
          git commit -m "Update target species index"
          branch="${BRANCH_NAME:-main}"
          git fetch origin "$branch"
          git pull --rebase origin "$branch" || true
          git push origin "$branch"
