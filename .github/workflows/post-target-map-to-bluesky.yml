name: Post target species map to Bluesky

on:
  schedule:
    - cron: "0 15 * * 3"
  workflow_dispatch:
    inputs:
      target:
        description: "Force a specific target map"
        required: false
        default: "Estero Target Species"
        type: choice
        options:
          - "Estero Target Species"
      extra_hashtag:
        description: "Optional extra hashtags. Space-separated. Example: '#floridabirds #birding'"
        required: false
        default: ""
        type: string

jobs:
  post-target:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    concurrency:
      group: bluesky-target-weekly
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Post target species map to Bluesky
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}

          FORCE_MAP_URL: "https://goodbirds.org/targets/estero/"
          FORCE_POST_TEXT: "Target species sightings near Koreshan State Park in Estero, FL: Burrowing Owls, Limpkins, Roseate Spoonbills, and Painted Buntings 🦉🐦 #ebird #birds #florida"
          FORCE_ALT_TEXT: "Full-page screenshot of the Goodbirds target species map for Estero, Florida"

          EXTRA_HASHTAG: ${{ github.event.inputs.extra_hashtag }}
        run: |
          python scripts/capture_and_post_bsky.py