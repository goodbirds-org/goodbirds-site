name: Post map screenshot to Bluesky

on:
  schedule:
    - cron: "0 10 * * *"   # 06:00 ET during Daylight Time
    - cron: "0 11 * * *"   # 06:00 ET during Standard Time
  workflow_dispatch:
    inputs:
      city:
        description: "Force a specific city (optional)"
        required: false
        default: ""
        type: choice
        options: ["", "Manhattan", "Cambridge", "Chicago", "Portland, OR", "San Diego, CA", "Philadelphia", "Colorado Springs", "Fort Worth", "Cape May", "San Francisco", "Tucson"]
      extra_hashtag:
        description: "Optional extra hashtags. Space-separated. Example: '#bluefootedbooby #migration'"
        required: false
        default: ""
        type: string
        
jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    concurrency:
      group: bluesky-daily
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Post rotating screenshot to Bluesky
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}

          # If city input is set, force that city for this run
          FORCE_CITY_NAME: ${{ github.event.inputs.city }}
          # Optional extra hashtags to append to post_text
          EXTRA_HASHTAG: ${{ github.event.inputs.extra_hashtag }}

          # Optional debugging
          # DRY_RUN: "1"
          # WAIT_MS: "8000"
        run: |
          python scripts/capture_and_post_bsky.py
